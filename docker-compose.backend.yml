services:
  # PostgreSQL with PostGIS for geospatial data
  postgres:
    image: postgis/postgis:15-3.3
    container_name: kzmap-postgres
    command: postgres -c shared_buffers=512MB -c work_mem=64MB -c effective_cache_size=1GB -c random_page_cost=1.1
    environment:
      POSTGRES_DB: kzmap
      POSTGRES_USER: kzmap_user
      POSTGRES_PASSWORD: kzmap_password
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/database/migrations:/docker-entrypoint-initdb.d/02-migrations
      - ./backend/database/03-init_data.sh:/docker-entrypoint-initdb.d/03-init_data.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kzmap_user -d kzmap"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kzmap-network
    restart: unless-stopped

  # Redis for map caching
  redis:
    image: redis:7-alpine
    container_name: kzmap-redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    networks:
      - kzmap-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth Service (Go + Gin)
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: kzmap-auth-service
    environment:
      PORT: 8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: kzmap
      DB_USER: kzmap_user
      DB_PASSWORD: kzmap_password
      JWT_SECRET: ${JWT_SECRET:-kazakhstan-map-secret-key-2024-production}
      JWT_EXPIRY_HOURS: 24
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-https://map.aetherion.work/auth/google/callback}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: noreply@freshmap.team
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kzmap-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Map Service (Go + Gin)
  map-service:
    build:
      context: ./backend/map-service
      dockerfile: Dockerfile
    container_name: kzmap-map-service
    environment:
      PORT: 8082
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: kzmap
      DB_USER: kzmap_user
      DB_PASSWORD: kzmap_password
      REDIS_URL: redis:6379
      JWT_SECRET: ${JWT_SECRET:-kazakhstan-map-secret-key-2024-production}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kzmap-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway (Nginx)
  api-gateway:
    image: nginx:alpine
    container_name: kzmap-api-gateway
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      auth-service:
        condition: service_healthy
      map-service:
        condition: service_healthy
    networks:
      - kzmap-network
    restart: unless-stopped

  # DB init / migrations + geodata import
  init-db:
    image: postgis/postgis:15-3.3
    container_name: kzmap-init-db
    volumes:
      - ./backend:/app
    working_dir: /app
    environment:
      PGPASSWORD: kzmap_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kzmap-network
    entrypoint: >
      sh -c "
      echo 'Running all migrations (idempotent)...';
      psql -h postgres -U kzmap_user -d kzmap -f database/migrations/001_initial_schema.sql;
      psql -h postgres -U kzmap_user -d kzmap -f database/migrations/002_geo_object_history.sql;
      psql -h postgres -U kzmap_user -d kzmap -f database/migrations/003_user_profile_and_complaints.sql;
      psql -h postgres -U kzmap_user -d kzmap -f database/migrations/004_tile_performance.sql;
      psql -h postgres -U kzmap_user -d kzmap -f database/migrations/005_area_metadata.sql;
      echo 'Migrations done.';
      echo 'Loading geodata if gpkg exists...';
      if [ -f gpkg_data/kazakhstan.gpkg ]; then
        count=$$(psql -h postgres -U kzmap_user -d kzmap -t -c \"SELECT count(*) FROM geo_objects;\");
        if [ $$count -lt 500000 ]; then
          echo 'Less than 500k objects, running full import...';
          DB_HOST=postgres DB_PORT=5432 ./load_all_gpkg.sh;
        else
          echo \"Already have $$count objects, skipping import.\";
        fi;
      else
        echo 'No gpkg file found.';
      fi;
      "

  # Deploy webhook
  webhook:
    build:
      context: ./backend/webhook
      dockerfile: Dockerfile
    container_name: kzmap-webhook
    environment:
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      DEPLOY_PATH: ${DEPLOY_PATH:-/home/ask/GitHub/map}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DEPLOY_PATH:-/home/ask/GitHub/map}:${DEPLOY_PATH:-/home/ask/GitHub/map}
    ports:
      - "9001:9000"
    networks:
      - kzmap-network
    restart: unless-stopped

  # Swagger UI — API documentation
  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: kzmap-swagger-ui
    ports:
      - "8083:8080"
    volumes:
      - ./swagger:/usr/share/nginx/html/swagger:ro
    environment:
      URLS: >
        [
          {"url": "/swagger/auth-service.yaml", "name": "Auth Service"},
          {"url": "/swagger/map-service.yaml",  "name": "Map Service"}
        ]
    networks:
      - kzmap-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  kzmap-network:
    driver: bridge
