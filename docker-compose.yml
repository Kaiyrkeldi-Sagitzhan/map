services:
  # PostgreSQL with PostGIS for geospatial data
  postgres:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: kzmap
      POSTGRES_USER: kzmap_user
      POSTGRES_PASSWORD: kzmap_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/database/migrations:/docker-entrypoint-initdb.d/02-migrations
      - ./backend/database/03-init_data.sh:/docker-entrypoint-initdb.d/03-init_data.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U kzmap_user -d kzmap" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kzmap-network
    restart: unless-stopped

  # Redis for map caching
  redis:
    image: redis:7-alpine
    container_name: kzmap-redis
    ports:
      - "6380:6379"
    networks:
      - kzmap-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth Service (Go + Gin)
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: kzmap-auth-service
    environment:
      PORT: 8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: kzmap
      DB_USER: kzmap_user
      DB_PASSWORD: kzmap_password
      JWT_SECRET: ${JWT_SECRET:-kazakhstan-map-secret-key-2024-production}
      JWT_EXPIRY_HOURS: 24
      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: http://localhost:3000/auth/google/callback
      # SMTP (for email verification)
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USERNAME: adil.groud@gmail.com
      SMTP_PASSWORD: ezah cubj vbro lzvl
      SMTP_FROM: noreply@freshmap.team
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kzmap-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Map Service (Go + Gin)
  map-service:
    build:
      context: ./backend/map-service
      dockerfile: Dockerfile
    container_name: kzmap-map-service
    environment:
      PORT: 8082
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: kzmap
      DB_USER: kzmap_user
      DB_PASSWORD: kzmap_password
      REDIS_URL: redis:6379
      JWT_SECRET: ${JWT_SECRET:-kazakhstan-map-secret-key-2024-production}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kzmap-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kzmap-frontend
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_AUTH_SERVICE_URL: http://api-gateway
      VITE_MAP_SERVICE_URL: http://api-gateway
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      map-service:
        condition: service_healthy
    networks:
      - kzmap-network
    restart: unless-stopped

  # API Gateway (Nginx)
  api-gateway:
    image: nginx:alpine
    container_name: kzmap-api-gateway
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      auth-service:
        condition: service_healthy
      map-service:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - kzmap-network
    restart: unless-stopped

  # Auto-initialization service
  init-db:
    image: postgis/postgis:15-3.3
    container_name: kzmap-init-db
    volumes:
      - ./backend:/app
    working_dir: /app
    environment:
      PGPASSWORD: kzmap_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kzmap-network
    entrypoint: >
      sh -c "
      echo 'Checking database state...'
      count=$$(psql -h postgres -U kzmap_user -d kzmap -t -c \"SELECT count(*) FROM information_schema.tables WHERE table_name = 'geo_objects';\")
      if [ $$count -eq 0 ]; then
        echo 'Database empty. Running migrations and import...'
        psql -h postgres -U kzmap_user -d kzmap -f database/migrations/001_initial_schema.sql
        psql -h postgres -U kzmap_user -d kzmap -f database/migrations/002_geo_object_history.sql
        ./load_all_gpkg.sh
      else
        echo 'Database already initialized.'
      fi
      "

volumes:
  postgres_data:

networks:
  kzmap-network:
    driver: bridge