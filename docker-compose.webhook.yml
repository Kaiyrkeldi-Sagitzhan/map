services:
  webhook:
    build:
      context: ./backend/webhook
      dockerfile: Dockerfile
    container_name: kzmap-webhook
    environment:
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      DEPLOY_PATH: ${DEPLOY_PATH:-/home/ask/GitHub/map}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DEPLOY_PATH:-/home/ask/GitHub/map}:${DEPLOY_PATH:-/home/ask/GitHub/map}
    ports:
      - "9001:9000"
    networks:
      - kzmap-network
    restart: unless-stopped

networks:
  kzmap-network:
    external: true
