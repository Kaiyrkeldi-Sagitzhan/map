name: CI/CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  # ─── Build & Test ────────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: |
            backend/auth-service/go.sum
            backend/map-service/go.sum

      # ── auth-service ──
      - name: Build auth-service
        working-directory: backend/auth-service
        run: go build ./...

      - name: Vet auth-service
        working-directory: backend/auth-service
        run: go vet ./...

      - name: Test auth-service
        working-directory: backend/auth-service
        run: go test ./...

      # ── map-service ──
      - name: Build map-service
        working-directory: backend/map-service
        run: go build ./...

      - name: Vet map-service
        working-directory: backend/map-service
        run: go vet ./...

      - name: Test map-service
        working-directory: backend/map-service
        run: go test ./...

      # ── Docker builds ──
      - name: Build auth-service Docker image
        run: docker build -t kzmap-auth-service ./backend/auth-service

      - name: Build map-service Docker image
        run: docker build -t kzmap-map-service ./backend/map-service

      - name: Build frontend Docker image
        run: docker build -t kzmap-frontend ./frontend

  # ─── Deploy (only on push to main) ──────────────────────────────────────────
  deploy:
    name: Deploy to Server
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy via webhook
        run: |
          PAYLOAD='{"ref":"main"}'
          SIG="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print $2}')"
          curl -fsSL \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Signature: $SIG" \
            -d "$PAYLOAD" \
            https://map.aetherion.work/deploy
